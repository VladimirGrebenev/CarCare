name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: carcare-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
      - run: npm ci
      - run: npm run lint

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: carcare-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.22.2
      - run: go fmt ./...
      - run: go vet ./...

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: carcare-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
      - run: npm ci
      - run: npm run build

  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: carcare-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.22.2
      - run: go build -v ./...

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: carcare-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
      - run: npm ci
      - run: npm test -- --watch=false

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: carcare-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.22.2
      - run: go test -v ./...

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./carcare-backend
          file: ./carcare-backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/carcare-backend:dev
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./carcare-frontend
          file: ./carcare-frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/carcare-frontend:dev

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploy step here (e.g., SSH, kubectl, or cloud CLI)"
          # Example: ssh user@staging-server 'docker pull ... && docker-compose up -d'
