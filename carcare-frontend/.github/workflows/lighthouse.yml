name: Lighthouse PWA Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd carcare-frontend
          npm ci
      - name: Build frontend
        run: |
          cd carcare-frontend
          npm run build || npm run build:prod || echo 'No build script'
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli
      - name: Run Lighthouse CI
        run: |
          cd carcare-frontend
          npx lhci autorun --config=./lighthouserc.json || npx lhci autorun || echo 'No LHCI config, running default'
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: carcare-frontend/.lighthouseci
