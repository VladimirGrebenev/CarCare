version: "3.8"

services:
  backend:
    build:
      context: ./carcare-backend
      dockerfile: Dockerfile
    image: carcare-backend:dev
    container_name: carcare-backend
    env_file:
      - ./carcare-backend/.env
    environment:
      JWT_SECRET: "carcare-super-secret-key-2024-change-in-production"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - carcare
    depends_on:
      db:
        condition: service_healthy
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  db:
    image: postgres:15
    container_name: carcare-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carcare
    ports:
      - "5432:5432"
    volumes:
      - carcare-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - carcare
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  frontend:
    build:
      context: ./carcare-frontend
      dockerfile: Dockerfile
    image: carcare-frontend:dev
    container_name: carcare-frontend
    env_file:
      - ./carcare-frontend/.env
    ports:
      - "3000:80"
    read_only: false
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    # volumes:
    #   - ./carcare-frontend:/app
    restart: unless-stopped
    networks:
      - carcare
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy

networks:
  carcare:
    driver: bridge

volumes:
  carcare-db-data:
